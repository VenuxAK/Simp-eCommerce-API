services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpcommerce-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - ADMIN_URL=${ADMIN_URL:-http://localhost:5173}
      - STOREFRONT_URL=${STOREFRONT_URL:-http://localhost:3000}
      - DB_HOST=db
      - DB_HOST_READ=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-simp_commerce}
      - DB_USERNAME=${DB_USERNAME:-simpcommerce}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@simpcommerce.com}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - NIGHTWATCH_TOKEN=${NIGHTWATCH_TOKEN}
    volumes:
      - storage_data:/var/www/html/storage
      - ./storage/app/backups:/var/www/html/storage/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpcommerce-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-simp_commerce}
      - DB_USERNAME=${DB_USERNAME:-simpcommerce}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@simpcommerce.com}
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: simpcommerce-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-simp_commerce}
      - POSTGRES_USER=${DB_USERNAME:-simpcommerce}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-simpcommerce} -d ${DB_DATABASE:-simp_commerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: simpcommerce-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redis_data:
  storage_data:
